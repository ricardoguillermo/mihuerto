<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalendarioSiembra</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <h1>🌱 CalendarioSiembra</h1>
    <p>Calendario de siembra y seguimiento de tu huerto</p>
    <a class="header-link" href="#miHuerto">Ir a mi huerto</a>
  </header>

  <main class="container">
    <!-- CATÁLOGO -->
    <section class="panel">
      <h2>Catálogo de plantas</h2>

      <div class="filtros">
        <input type="text" id="buscador" placeholder="Buscar por nombre..." />

        <select id="filtroMes">
          <option value="">Todos los meses</option>
          <option value="1">Enero</option>
          <option value="2">Febrero</option>
          <option value="3">Marzo</option>
          <option value="4">Abril</option>
          <option value="5">Mayo</option>
          <option value="6">Junio</option>
          <option value="7">Julio</option>
          <option value="8">Agosto</option>
          <option value="9">Septiembre</option>
          <option value="10">Octubre</option>
          <option value="11">Noviembre</option>
          <option value="12">Diciembre</option>
        </select>

        <select id="filtroCategoria">
          <option value="">Todas las categorías</option>
          <option value="Comestible">Comestible</option>
          <option value="Fruto">Fruto</option>
          <option value="Frutal">Frutal</option>
          <option value="Hierba">Hierba</option>
          <option value="Flor">Flor</option>
        </select>
      </div>

      <div id="resumenMes" class="resumen"></div>

      <details id="panelAltaPlanta" class="panel-alta">
        <summary>Agregar nueva planta</summary>
        <form id="formPlanta" class="form-planta">
          <p id="formPlantaTitulo" class="form-planta-titulo">Modo alta de planta</p>
          <input type="text" id="plantaNombre" placeholder="Nombre" required />
          <input type="text" id="plantaCategoria" placeholder="Categoría" required />
          <input type="text" id="plantaHumedad" placeholder="Humedad (opcional)" />
          <input type="text" id="plantaSol" placeholder="Sol (opcional)" />
          <input type="number" id="plantaGermina" min="0" placeholder="Germina en días" />
          <input type="number" id="plantaCosecha" min="0" placeholder="Cosecha en días" />
          <input type="text" id="plantaMeses" placeholder="Meses (1,2,3...)" required />
          <input type="text" id="plantaMaceta" placeholder="Maceta mínima (opcional)" />
          <input type="text" id="plantaImg1" placeholder="Imagen etapa 1 (URL o ruta)" />
          <input type="text" id="plantaImg2" placeholder="Imagen etapa 2 (URL o ruta)" />
          <textarea id="plantaTips" placeholder="Tips (opcional)"></textarea>
          <div class="acciones-form-planta">
            <button id="btnGuardarPlanta" type="submit">Guardar planta en catálogo</button>
            <button id="btnCancelarEdicionPlanta" type="button" class="btn-secundario hidden">Cancelar edición</button>
          </div>
        </form>
      </details>

      <div id="contenedorPlantas" class="grid"></div>
    </section>

    <!-- MI HUERTO -->
    <section id="miHuerto" class="panel">
      <h2>🪴 Mi huerto</h2>
      <div class="panel-acciones">
        <button id="btnInicioDesdeHuerto" type="button" class="btn-secundario">Volver al inicio</button>
      </div>

      <form id="formHuerto" class="form-huerto">
        <select id="huertoPlanta">
          <option value="">Seleccionar planta</option>
          <option value="__manual__">Otra planta no listada</option>
        </select>

        <input type="text" id="huertoPlantaManual" class="hidden" placeholder="Nombre de la planta" />

        <label class="opcion-check" for="huertoNoSemilla">
          <input type="checkbox" id="huertoNoSemilla" />
          No es por semilla
        </label>

        <div class="campo-etiqueta">
          <label for="huertoFecha" id="labelHuertoFecha">Fecha de siembra</label>
          <input type="date" id="huertoFecha" required />
          <button id="btnFechaHoy" type="button" class="btn-secundario">Usar fecha de hoy</button>
        </div>

        <div id="pronosticoHuerto" class="pronostico-huerto" aria-live="polite"></div>

        <input type="number" id="huertoCantidad" min="1" placeholder="Cantidad (opcional)" />
        <input type="text" id="huertoLugar" placeholder="Lugar (maceta, cantero, patio...)" />
        <textarea id="huertoNotas" placeholder="Notas"></textarea>

        <button type="submit">Guardar en mi huerto</button>
      </form>

      <div id="contenedorHuerto" class="grid"></div>
    </section>
  </main>

  <!-- MODAL -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="cerrarModal" class="cerrar">✖</button>
      <div id="modalDetalle"></div>
      <div class="acciones-modal">
        <button id="btnInicioDesdeModal" type="button" class="btn-secundario">Cerrar y volver al inicio</button>
      </div>
    </div>
  </div>

  <script src="plantas.js"></script>
  <script src="miHuerto.js"></script>

  <script src="main.js"></script>
</body>
</html>
